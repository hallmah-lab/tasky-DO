apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasky
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tasky
  template:
    metadata:
      labels:
        app: tasky
    spec:
      containers:
        - name: tasky
          image: registry.digitalocean.com/tasky-registry/tasky:latest
          ports:
            - containerPort: 8080
          env:
            - name: SECRET_KEY
              value: "supersecretkey123"
            - name: MONGODB_URI
              value: "mongodb://localhost:27017"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
